name: Watch Openfootball World Cup Data

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: sync-worldcup
  cancel-in-progress: false

jobs:
  sync:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm run sync:worldcup
      - name: Commit updated data
        id: commit_data
        run: |
          if git diff --quiet -- world-cup-2026.json; then
            echo "No World Cup data changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add world-cup-2026.json
          git commit -m "Update World Cup data"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"
      - uses: actions/configure-pages@v5
        if: steps.commit_data.outputs.changed == 'true'
      - uses: actions/upload-pages-artifact@v3
        if: steps.commit_data.outputs.changed == 'true'
        with:
          path: "."
      - id: deployment
        if: steps.commit_data.outputs.changed == 'true'
        uses: actions/deploy-pages@v4
